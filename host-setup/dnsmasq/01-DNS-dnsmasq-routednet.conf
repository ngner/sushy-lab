#/etc/NetworkManager/dnsmasq.d/01-DNS-dnsmasq-routednet.conf
# local dns -- CHANGE: replace lab.example.com with your own domain
local=/routednet.lab.example.com/
addn-hosts=/etc/virsh-routednet-dnsmasq.hosts
address=/apps-crc.testing/127.0.0.1

domain-needed
bogus-priv

# Automatically add <domain> to simple names in a hosts-file.
expand-hosts

# Upstream public
no-poll
server=8.8.8.8
